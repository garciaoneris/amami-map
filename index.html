<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amami Eats — Where to eat in Amami Ōshima</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>Amami Eats</h1>
      <p class="subtitle">A personal guide to eating in Amami Ōshima · click any pin or card to open in Google Maps</p>
    </div>
    <div class="counter"><span id="visible-count">0</span> places shown</div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="controls">
        <div class="row">
          <label for="sort">Sort</label>
          <select id="sort">
            <option value="must-visit">Must-visit first</option>
            <option value="meal">By meal time</option>
            <option value="region">By region (N → S)</option>
            <option value="name">Name (A → Z)</option>
          </select>
        </div>
        <div class="hint">Zoom or pan the map — the list shows only what's in view.</div>
      </div>

      <div id="list" class="list" aria-live="polite"></div>
    </aside>

    <main id="map" aria-label="Map of restaurants in Amami"></main>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="places.js"></script>
  <script src="app.js"></script>
</body>
</html>
